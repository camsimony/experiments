name: Deploy clocks to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'clocks/**'
      - '.github/workflows/clocks-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: clocks/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: clocks
        run: pnpm install --frozen-lockfile

      - name: Test
        working-directory: clocks
        run: pnpm test -- --run

      - name: Build
        working-directory: clocks
        run: pnpm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: clocks/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

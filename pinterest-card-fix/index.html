<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More to explore — Pinterest hover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #fff;
    color: #171717;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .container {
    width: 880px;
    padding: 32px;
    border-radius: 24px;
    box-shadow:
      0 0 0 1px rgba(0, 0, 0, 0.06),
      0 1px 2px -1px rgba(0, 0, 0, 0.06),
      0 2px 4px 0 rgba(0, 0, 0, 0.04);
  }

  .heading {
    margin-bottom: 20px;
    font-size: 20px;
    font-weight: 700;
    color: #171717;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
  }

  .item {
    display: flex;
    flex-direction: column;
    padding: 0 8px;
    cursor: pointer;
  }

  .card {
    position: relative;
    aspect-ratio: 3 / 4;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    outline: 1px solid rgba(0, 0, 0, 0.1);
    outline-offset: -1px;
    transition: all 200ms ease-out;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .label {
    position: relative;
    z-index: 20;
    margin-top: 12px;
    display: flex;
    align-items: center;
    white-space: nowrap;
    font-size: 14px;
    font-variation-settings: "wght" 500;
    filter: blur(0);
    color: #171717;
    transition:
      opacity 200ms ease-out,
      filter 200ms ease-out,
      font-variation-settings 200ms ease-out;
  }

  .text {
    display: inline-grid;
    grid-template-areas: "stack";
  }

  .text > span,
  .text::after {
    grid-area: stack;
  }

  .text::after {
    content: attr(data-text);
    font-variation-settings: "wght" 600;
    visibility: hidden;
    height: 0;
    overflow: hidden;
  }

  .row:hover .item:not(:hover) .card {
    opacity: 0.1;
  }

  .row:hover .item:not(:hover) .label {
    opacity: 0;
    filter: blur(3px);
  }

  .item:hover .card {
    transform: scale(1.07) rotate(var(--tilt, 0deg));
    z-index: 10;
    box-shadow:
      0 1px 2px rgba(0, 0, 0, 0.06),
      0 8px 16px rgba(0, 0, 0, 0.08),
      0 24px 40px rgba(0, 0, 0, 0.12);
  }

  .item:hover .label {
    font-variation-settings: "wght" 600;
  }

  @media (prefers-color-scheme: dark) {
    .card {
      outline-color: rgba(255, 255, 255, 0.1);
    }
  }
</style>
</head>
<body>
<section class="container">
  <h2 class="heading">More to explore</h2>
  <div class="row">
    <div class="item">
      <div class="card" style="--tilt: -4deg" role="button" tabindex="0" aria-label="Nature">
        <img src="1.png" alt="">
      </div>
      <div class="label">
        <span class="text" data-text="Nature"><span>Nature</span></span>
      </div>
    </div>
    <div class="item">
      <div class="card" style="--tilt: -3deg" role="button" tabindex="0" aria-label="Color">
        <img src="2.png" alt="">
      </div>
      <div class="label">
        <span class="text" data-text="Color"><span>Color</span></span>
      </div>
    </div>
    <div class="item">
      <div class="card" style="--tilt: 3deg" role="button" tabindex="0" aria-label="Pattern">
        <img src="3.png" alt="">
      </div>
      <div class="label">
        <span class="text" data-text="Pattern"><span>Pattern</span></span>
      </div>
    </div>
    <div class="item">
      <div class="card" style="--tilt: -2deg" role="button" tabindex="0" aria-label="Texture">
        <img src="4.png" alt="">
      </div>
      <div class="label">
        <span class="text" data-text="Texture"><span>Texture</span></span>
      </div>
    </div>
    <div class="item">
      <div class="card" style="--tilt: 4deg" role="button" tabindex="0" aria-label="Light">
        <img src="5.png" alt="">
      </div>
      <div class="label">
        <span class="text" data-text="Light"><span>Light</span></span>
      </div>
    </div>
  </div>
</section>
</body>
</html>
